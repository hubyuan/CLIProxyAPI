name: ghcr-release

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Full source commit SHA to build
        required: true
        type: string
      version:
        description: Immutable image version tag
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha }}

      - name: Validate release inputs
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.source_sha }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "${REQUESTED_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "source_sha must be a full 40-character lowercase commit SHA" >&2
            exit 1
          fi
          if [[ ! "${VERSION}" =~ ^v[0-9A-Za-z][0-9A-Za-z._-]*$ ]]; then
            echo "version must be an immutable v-prefixed container tag" >&2
            exit 1
          fi

          source_sha="$(git rev-parse HEAD)"
          if [[ "${source_sha}" != "${REQUESTED_SHA}" ]]; then
            echo "checked out ${source_sha}, expected ${REQUESTED_SHA}" >&2
            exit 1
          fi

          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/cliproxyapi"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "SOURCE_SHA=${source_sha}"
            echo "IMAGE=${image}"
            echo "BUILD_DATE=${build_date}"
          } >> "${GITHUB_ENV}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:${{ inputs.version }}
          build-args: |
            VERSION=${{ inputs.version }}
            COMMIT=${{ env.SOURCE_SHA }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          labels: |
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.revision=${{ env.SOURCE_SHA }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.base.name=router-for-me/CLIProxyAPI:v7.2.81
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record immutable image reference
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          {
            echo "## GHCR release"
            echo
            echo "- Version: \`${VERSION}\`"
            echo "- Source commit: \`${SOURCE_SHA}\`"
            echo "- Image tag: \`${IMAGE}:${VERSION}\`"
            echo "- Immutable image: \`${IMAGE}@${DIGEST}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
